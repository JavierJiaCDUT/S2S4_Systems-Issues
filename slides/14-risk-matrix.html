<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Risk Assessment Matrix</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .cell-low { color: #059669; font-weight: 500; }
    .cell-med { color: #d97706; font-weight: 500; }
    .cell-high { color: #ea580c; font-weight: 700; }
    .cell-ext { color: #dc2626; font-weight: 800; }
  </style>
</head>
<body>
  <div class="slide light theme-tech">
    <p class="eyebrow animate">Tool</p>
    <h2 class="slide-title animate d1">Risk Assessment Matrix</h2>
    <div class="content">
      <table class="data-table animate d2">
        <thead>
          <tr>
            <th>Likelihood / Impact</th>
            <th>Low</th>
            <th>Medium</th>
            <th>High</th>
            <th>Critical</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><b>Almost Certain</b></td>
            <td class="cell-med">Medium</td>
            <td class="cell-high">High</td>
            <td class="cell-ext">Extreme</td>
            <td class="cell-ext">Extreme</td>
          </tr>
          <tr>
            <td><b>Likely</b></td>
            <td class="cell-med">Medium</td>
            <td class="cell-high">High</td>
            <td class="cell-high">High</td>
            <td class="cell-ext">Extreme</td>
          </tr>
          <tr>
            <td><b>Possible</b></td>
            <td class="cell-low">Low</td>
            <td class="cell-med">Medium</td>
            <td class="cell-high">High</td>
            <td class="cell-high">High</td>
          </tr>
          <tr>
            <td><b>Unlikely</b></td>
            <td class="cell-low">Low</td>
            <td class="cell-low">Low</td>
            <td class="cell-med">Medium</td>
            <td class="cell-med">Medium</td>
          </tr>
          <tr>
            <td><b>Rare</b></td>
            <td class="cell-low">Low</td>
            <td class="cell-low">Low</td>
            <td class="cell-low">Low</td>
            <td class="cell-med">Medium</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="page-indicator">14 / 22</div>
  </div>
</body>
</html>
